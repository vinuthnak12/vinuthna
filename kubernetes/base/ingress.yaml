apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio
  namespace: portfolio
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: portfolio.example.com
      http:
        paths: [{ path: /, pathType: Prefix, backend: { service: { name: portfolio, port: { number: 80 } } } }]
