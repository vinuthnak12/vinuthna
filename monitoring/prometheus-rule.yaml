apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: portfolio-alerts, namespace: portfolio, labels: { release: monitoring } }
spec:
  groups:
    - name: portfolio.availability
      rules:
        - alert: PortfolioUnavailable
          expr: probe_success{job=~".*portfolio.*"} == 0
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: Portfolio endpoint is unavailable
            description: The portfolio health endpoint has failed for five minutes.
